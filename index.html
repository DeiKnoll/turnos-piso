<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<title>Turnos del Piso</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0f0f;--s:#1a1a1a;--s2:#222;--b:#2e2e2e;--t:#f0ede6;--tm:#888}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--t);font-family:'Syne',sans-serif;min-height:100vh;padding:1.5rem;display:flex;flex-direction:column;gap:1.25rem}
  header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;border-bottom:1px solid var(--b);padding-bottom:1.25rem}
  .logo{line-height:1}
  .logo .sup{display:block;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--tm);margin-bottom:4px;font-family:'Space Mono',monospace}
  .logo .main{display:block;font-size:clamp(1.8rem,5vw,3rem);font-weight:800;letter-spacing:-2px}
  .logo .addr{display:block;font-size:9px;letter-spacing:2px;color:var(--tm);margin-top:3px;font-family:'Space Mono',monospace;opacity:.55}
  .nav{display:flex;align-items:center;gap:.6rem}
  .nav button{background:var(--s);border:1px solid var(--b);color:var(--t);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:background .15s}
  .nav button:hover{background:var(--s2)}
  #today-btn{width:auto!important;border-radius:18px!important;padding:0 14px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;display:none}
  #wlbl{color:var(--tm);min-width:150px;text-align:center;font-size:10px}
  .sbar{display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:10px;color:var(--tm)}
  .dot{width:8px;height:8px;border-radius:50%;background:#888;flex-shrink:0}
  .dot.ok{background:#c8f55a}
  .dot.err{background:#ff4444}
  .dot.ld{background:#ffaa00;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .stats{display:flex;gap:1rem;flex-wrap:wrap}
  .stat{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:.6rem 1.2rem;font-family:'Space Mono',monospace;font-size:11px;color:var(--tm)}
  .stat strong{display:block;font-size:1.6rem;font-weight:800;color:var(--t);line-height:1}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;flex:1}
  .card{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:1.25rem;display:flex;flex-direction:column;gap:.875rem;position:relative;overflow:hidden;transition:border-color .2s,background .2s}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ac);border-radius:16px 16px 0 0}
  .card.done{border-color:#27ae27;background:#0d1f0d}
  .card.done::before{background:#27ae27}
  .card.ov{border-color:#3d1a1a}
  .card.ov::before{background:#ff4444}
  .ch{display:flex;align-items:center;gap:10px}
  .av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;flex-shrink:0;color:#0f0f0f}
  .pn{font-size:1rem;font-weight:800;letter-spacing:-.5px}
  .tn{font-family:'Space Mono',monospace;font-size:9px;color:var(--tm);margin-top:2px;text-transform:uppercase;letter-spacing:1px}
  .emo{border-radius:12px;display:flex;align-items:center;justify-content:center;padding:.75rem 0;font-size:4rem}
  .emo.dg{background:#27ae27}
  .emo.pg{background:var(--s2)}
  .badge{display:inline-flex;padding:4px 10px;border-radius:999px;font-size:9px;font-family:'Space Mono',monospace;font-weight:700;text-transform:uppercase}
  .bd{background:#1e3a0e;color:#c8f55a}
  .bp{background:var(--s2);color:var(--tm)}
  .bo{background:#3d0e0e;color:#ff6b6b}
  .btn{width:100%;padding:9px;border-radius:10px;border:1px solid var(--b);background:transparent;color:var(--tm);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;text-transform:uppercase;margin-top:auto;transition:all .15s}
  .btn:hover{background:var(--s2);color:var(--t)}
  .btn.mk{background:#27ae27;border-color:#27ae27;color:#fff;font-weight:700}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  footer{border-top:1px solid var(--b);padding-top:1rem;font-family:'Space Mono',monospace;font-size:9px;color:var(--tm);text-align:center;letter-spacing:1px}
  #toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--s);border:1px solid var(--b);border-radius:12px;padding:10px 20px;font-family:'Space Mono',monospace;font-size:11px;color:var(--t);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
  #toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <div class="logo">
    <span class="sup">Tareas de Limpieza</span>
    <span class="main">Turnos</span>
    <span class="addr">Tomas Alonso 212D</span>
  </div>
  <div class="nav">
    <button onclick="chW(-1)">&#8592;</button>
    <span id="wlbl"></span>
    <button onclick="chW(1)">&#8594;</button>
    <button id="today-btn" onclick="goToday()">HOY</button>
  </div>
</header>
<div class="sbar"><div class="dot ld" id="dot"></div><span id="slbl">Conectando...</span></div>
<div class="stats">
  <div class="stat"><strong id="sd">—</strong>Completados</div>
  <div class="stat"><strong id="sp">—</strong>Pendientes</div>
  <div class="stat"><strong id="so">—</strong>Atrasados</div>
</div>
<div class="grid" id="grid"></div>
<footer>TURNO ROTA CADA SEMANA &nbsp;·&nbsp; SINCRONIZADO EN TIEMPO REAL</footer>
<div id="toast"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getDatabase,ref,get,set}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FB=initializeApp({
  databaseURL:'https://turnos-piso-82d80-default-rtdb.europe-west1.firebasedatabase.app'
});
const DB=getDatabase(FB);

const PEOPLE=[
  {name:'David', color:'#c8f55a'},
  {name:'Jesid', color:'#ff7b54'},
  {name:'Yeinis',color:'#7ecff5'},
  {name:'Evan',  color:'#d4a5f5'},
];
const TASKS=[
  {name:'Baños',           icon:'🚿'},
  {name:'Cocina',          icon:'🍳'},
  {name:'Salón y pasillos',icon:'🛋️'},
  {name:'Sacar la basura', icon:'🗑️'},
];
const BASE=new Date(2026,4,25);

function curOff(){
  const n=new Date();n.setHours(0,0,0,0);
  const b=new Date(BASE);b.setHours(0,0,0,0);
  return Math.floor((n-b)/(7*864e5));
}

let wo=curOff();
let state={};
let saving=false;

function syncUI(s,m){
  document.getElementById('dot').className='dot '+s;
  document.getElementById('slbl').textContent=m;
}
function now(){return new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});}
function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function wLabel(o){
  const b=new Date(BASE);b.setDate(b.getDate()+o*7);
  const e=new Date(b);e.setDate(b.getDate()+6);
  const m=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const j=new Date(b.getFullYear(),0,1);
  const wn=Math.ceil(((b-j)/864e5+j.getDay()+1)/7);
  return`Sem ${wn} · ${b.getDate()} ${m[b.getMonth()]} – ${e.getDate()} ${m[e.getMonth()]}${o===curOff()?' ★':''}`;
}
function key(p,o){return`w${o}_${p.replace(/\s/g,'_')}`;}
function isDone(p,o){return!!state[key(p,o)];}
function isOv(p){return wo>0&&!isDone(p,wo-1);}

function render(){
  document.getElementById('wlbl').textContent=wLabel(wo);
  document.getElementById('today-btn').style.display=wo===curOff()?'none':'inline-block';
  let dc=0,pc=0,oc=0;
  document.getElementById('grid').innerHTML=PEOPLE.map((p,i)=>{
    const t=TASKS[(i+wo)%TASKS.length];
    const d=isDone(p.name,wo);
    const ov=!d&&isOv(p.name);
    if(d)dc++;else if(ov)oc++;else pc++;
    const cc=d?'card done':ov?'card ov':'card';
    const bc=d?'badge bd':ov?'badge bo':'badge bp';
    const bt=d?'✓ Hecho':ov?'⚠ Atrasado':'— Pendiente';
    const em=d?`<div class="emo dg">👍😄</div>`:`<div class="emo pg">😴</div>`;
    return`<div class="${cc}" style="--ac:${p.color}">
      <div class="ch">
        <div class="av" style="background:${p.color}">${p.name.slice(0,2).toUpperCase()}</div>
        <div><div class="pn">${p.name}</div><div class="tn">${t.icon} ${t.name}</div></div>
      </div>
      ${em}
      <span class="${bc}">${bt}</span>
      <button class="btn${d?' mk':''}" id="b${i}" onclick="window._toggle('${p.name}',${i})">
        ${d?'↩ Desmarcar':'✓ Marcar como hecho'}
      </button>
    </div>`;
  }).join('');
  document.getElementById('sd').textContent=dc;
  document.getElementById('sp').textContent=pc;
  document.getElementById('so').textContent=oc;
}

async function load(){
  if(saving)return;
  syncUI('ld','Sincronizando...');
  try{
    const snap=await get(ref(DB,'turnos'));
    state=snap.exists()?snap.val():{};
    syncUI('ok','Sincronizado · '+now());
    render();
  }catch(e){
    syncUI('err','Sin conexión');
    render();
  }
}

window._toggle=async function(persona,idx){
  if(saving)return;
  saving=true;
  const btn=document.getElementById('b'+idx);
  btn.disabled=true;
  const k=key(persona,wo);
  const newVal=!state[k];
  state[k]=newVal;
  render();
  syncUI('ld','Guardando...');
  try{
    await set(ref(DB,`turnos/${k}`),newVal);
    syncUI('ok','Guardado · '+now());
    toast(newVal?`✓ ${persona} marcado como hecho`:`↩ ${persona} desmarcado`);
  }catch(e){
    state[k]=!newVal;
    syncUI('err','Error al guardar');
    render();
  }finally{
    saving=false;
    btn.disabled=false;
  }
};

window.goToday=function(){wo=curOff();render();load();};
window.chW=function(d){wo+=d;render();load();};

render();
load();
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&!saving)load();});
setInterval(()=>{if(!saving&&!document.hidden)load();},300000);
</script>
</body>
</html>
